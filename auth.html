<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MentifyHub — Account</title>
  <link rel="stylesheet" href="mh-theme.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; }

    .auth-shell {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      text-decoration: none;
    }
    .auth-brand img { width: 36px; height: 36px; border-radius: 10px; object-fit: contain; }
    .auth-brand strong { font-size: 15px; font-weight: 700; color: var(--text); }

    .auth-card { padding: 26px; }

    .auth-title    { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .auth-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* Mode toggle */
    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 0 16px;
    }
    .pill-toggle {
      display: flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
    }
    .pill-toggle button {
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
      white-space: nowrap;
    }
    .pill-toggle button.active {
      background: #fff;
      border-color: rgba(29,78,216,.20);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(15,23,42,.06);
    }
    .back-link { font-size: 12px; color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }

    /* Role picker */
    .role-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .role-btn {
      flex: 1;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .role-btn.active {
      background: rgba(29,78,216,.07);
      border-color: rgba(29,78,216,.28);
      color: var(--accent);
    }

    /* Form */
    .auth-form { display: flex; flex-direction: column; gap: 0; }

    .form-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }

    /* Banner note */
    .auth-note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .auth-note.banner {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--soft);
      text-align: left;
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
    .auth-note.banner b { display: block; margin-bottom: 3px; }
    .auth-note.banner.info    { border-color: rgba(29,78,216,.18); background: rgba(29,78,216,.05); }
    .auth-note.banner.success { border-color: var(--accepted-line); background: var(--accepted-bg); }
    .auth-note.banner.error   { border-color: var(--declined-line); background: var(--declined-bg); }

    .hidden { display: none !important; }

    /* Forgot */
    .forgot-row { display: flex; justify-content: flex-end; margin-top: 4px; }
    .forgot-link { font-size: 12px; color: var(--accent2); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }
  </style>
</head>
<body>

<div class="auth-shell">
  <a class="auth-brand" href="index.html">
    <img src="logo.png" alt="MentifyHub"/>
    <strong>MentifyHub</strong>
  </a>

  <div class="mh-card auth-card">
    <div>
      <h1 class="auth-title" id="title">Create your account</h1>
      <p class="auth-subtitle" id="subtitle">Choose how you want to use MentifyHub.</p>
    </div>

    <div class="mode-row">
      <div class="pill-toggle" role="tablist">
        <button id="modeSignup" class="active" type="button" role="tab" aria-selected="true">Create account</button>
        <button id="modeSignin" type="button" role="tab" aria-selected="false">Sign in</button>
      </div>
      <a class="back-link" href="index.html">← Back to home</a>
    </div>

    <div class="role-row" id="rolePicker">
      <button class="role-btn active" id="menteeBtn" type="button">🎓 Mentee</button>
      <button class="role-btn" id="mentorBtn" type="button">🌱 Mentor</button>
    </div>

    <form class="auth-form" id="authForm" novalidate>
      <div id="nameBlock" class="mh-field">
        <label class="mh-label" for="fullName">Full name</label>
        <input class="mh-input" id="fullName" type="text" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="mh-field">
        <label class="mh-label" for="email">Email</label>
        <input class="mh-input" id="email" type="email" placeholder="you@email.com" autocomplete="username"/>
      </div>
      <div class="mh-field">
        <label class="mh-label" for="password">Password</label>
        <input class="mh-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <div class="forgot-row">
          <a class="forgot-link" href="#" id="forgotPassword">Forgot password?</a>
        </div>
      </div>

      <div class="form-actions">
        <button id="primaryBtn" class="mh-btn mh-btn-primary mh-btn-full mh-btn-lg" type="button">Create account</button>
        <button id="secondaryBtn" class="mh-btn mh-btn-full" type="button">Already have an account? Sign in</button>
      </div>
    </form>

    <div class="auth-note" id="note">By continuing, you agree to our Terms &amp; Privacy Policy.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const params = new URLSearchParams(location.search);
  let role = (params.get('role') || 'mentee').toLowerCase();
  let mode = (params.get('mode') || 'signup').toLowerCase();

  const menteeBtn  = document.getElementById('menteeBtn');
  const mentorBtn  = document.getElementById('mentorBtn');
  const rolePicker = document.getElementById('rolePicker');
  const modeSignup = document.getElementById('modeSignup');
  const modeSignin = document.getElementById('modeSignin');
  const title      = document.getElementById('title');
  const subtitle   = document.getElementById('subtitle');
  const nameBlock  = document.getElementById('nameBlock');
  const primaryBtn = document.getElementById('primaryBtn');
  const secondaryBtn = document.getElementById('secondaryBtn');
  const note       = document.getElementById('note');

  function escapeHtml(str){
    return String(str||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  function setNote(type, titleText, bodyText){
    if(!note) return;
    if(!type){
      note.className = 'auth-note';
      note.textContent = 'By continuing, you agree to our Terms & Privacy Policy.';
      return;
    }
    note.className = `auth-note banner ${type}`;
    const t = titleText ? `<b>${escapeHtml(titleText)}</b>` : '';
    note.innerHTML = `${t}${escapeHtml(bodyText||'')}`;
  }

  function setBusy(isBusy, label){
    primaryBtn.disabled = !!isBusy;
    secondaryBtn.disabled = !!isBusy;
    primaryBtn.textContent = isBusy ? (label||'Please wait…') : (mode==='signin' ? 'Sign in' : 'Create account');
  }

  function setRole(r){
    role = r==='mentor' ? 'mentor' : 'mentee';
    mentorBtn.classList.toggle('active', role==='mentor');
    menteeBtn.classList.toggle('active', role==='mentee');
    params.set('role', role);
    history.replaceState({},'',location.pathname+'?'+params.toString());
    updateCopy();
  }

  function setMode(m){
    mode = m==='signin' ? 'signin' : 'signup';
    const isSignin = mode==='signin';
    modeSignin.classList.toggle('active', isSignin);
    modeSignup.classList.toggle('active', !isSignin);
    modeSignin.setAttribute('aria-selected', String(isSignin));
    modeSignup.setAttribute('aria-selected', String(!isSignin));
    nameBlock.classList.toggle('hidden', isSignin);
    rolePicker.classList.toggle('hidden', isSignin);
    const pw = document.getElementById('password');
    if(pw) pw.setAttribute('autocomplete', isSignin ? 'current-password' : 'new-password');
    primaryBtn.textContent   = isSignin ? 'Sign in' : 'Create account';
    secondaryBtn.textContent = isSignin ? "Don't have an account? Create one" : "Already have an account? Sign in";
    params.set('mode', mode);
    history.replaceState({},'',location.pathname+'?'+params.toString());
    updateCopy();
  }

  function updateCopy(){
    if(mode==='signin'){
      title.textContent    = 'Welcome back';
      subtitle.textContent = 'Sign in to continue to MentifyHub.';
      return;
    }
    title.textContent    = role==='mentor' ? 'Create mentor account' : 'Create mentee account';
    subtitle.textContent = role==='mentor'
      ? 'Join as a mentor and support green skills growth.'
      : 'Get guidance and grow your green skills.';
  }

  menteeBtn.onclick   = () => setRole('mentee');
  mentorBtn.onclick   = () => setRole('mentor');
  modeSignup.onclick  = () => setMode('signup');
  modeSignin.onclick  = () => setMode('signin');
  secondaryBtn.onclick= () => setMode(mode==='signin' ? 'signup' : 'signin');

  setRole(role);
  setMode(mode);

  // Supabase
  const SUPABASE_URL      = "https://mscgaaaobxiuzqsukvjc.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y";
  const TABLES = { mentees:"mentees", mentors:"mentors", profiles:"profiles" };

  const sb = (SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.startsWith("ey"))
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  function requireSupabase(){
    if(!sb){ setNote('error','Supabase not connected','Add your Supabase URL + anon key.'); return false; }
    return true;
  }

  (function(){
    try{
      const qs = new URLSearchParams(location.search);
      const hasConfirmParams = qs.has('code')||qs.has('token')||qs.has('type')||location.hash.includes('access_token=');
      if(hasConfirmParams){
        setNote('success','Email confirmed','Please sign in to continue.');
        setMode('signin');
        history.replaceState({},document.title,'/auth.html?mode=signin');
      }
    }catch(_){}
  })();

  async function routeAfterAuth(user){
    const rt = params.get('returnTo');
    if(rt){ window.location.href = rt; return; }
    let r = (user.user_metadata && user.user_metadata.role) ? String(user.user_metadata.role).toLowerCase() : role;
    try{
      if(sb && TABLES.profiles){
        const { data: prof } = await sb.from(TABLES.profiles).select("role").eq("user_id", user.id).maybeSingle();
        if(prof?.role) r = String(prof.role).toLowerCase();
      }
    }catch(_){}
    try{
      if(r==="mentor"){
        const { data: m } = await sb.from(TABLES.mentors).select("user_id").eq("user_id", user.id).maybeSingle();
        window.location.href = m ? "mentor-dashboard.html" : "mentor-onboarding.html";
      }else{
        const { data: me } = await sb.from(TABLES.mentees).select("user_id").eq("user_id", user.id).maybeSingle();
        window.location.href = me ? "mentee-dashboard.html" : "mentee-onboarding.html";
      }
    }catch(e){
      window.location.href = (r==="mentor") ? "mentor-onboarding.html" : "mentee-onboarding.html";
    }
  }

  primaryBtn.onclick = async () => {
    if(!requireSupabase()) return;
    setNote(null);
    setBusy(true, mode==='signin' ? 'Signing in…' : 'Creating account…');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if(!email||!password){ setBusy(false); setNote('error','Missing details','Enter your email and password.'); return; }
    if(!/^\S+@\S+\.\S+$/.test(email)){ setBusy(false); setNote('error','Invalid email','Enter a valid email address.'); return; }
    if(mode!=='signin' && password.length<6){ setBusy(false); setNote('error','Weak password','Use at least 6 characters.'); return; }
    try{
      if(mode==='signin'){
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if(error) throw error;
        await routeAfterAuth(data.user);
        setBusy(false);
        return;
      }
      const fullName = document.getElementById('fullName').value.trim();
      if(!fullName){ setBusy(false); setNote('error','Missing name','Enter your full name.'); return; }
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: {
          data: { role, full_name: fullName },
          emailRedirectTo: (location.origin.includes('localhost')||location.origin.includes('127.0.0.1'))
            ? `${location.origin}/auth.html?mode=signin`
            : 'https://www.mentifyhub.com/auth.html?mode=signin'
        }
      });
      if(error) throw error;
      try{ await sb.from(TABLES.profiles).upsert({ user_id:data.user?.id, role, full_name:fullName, email },{ onConflict:'user_id' }); }catch(_){}
      setBusy(false);
      setNote('success','Account created','You can now sign in.');
      setMode('signin');
    }catch(err){
      setBusy(false);
      const msg = String(err?.message||'').toLowerCase();
      if(msg.includes('invalid login credentials'))  { setNote('error','Sign in failed','Incorrect email or password.'); return; }
      if(msg.includes('already registered'))          { setNote('info','Account exists','This email is registered. Please sign in.'); setMode('signin'); return; }
      if(msg.includes('email rate limit'))            { setNote('error','Too many attempts','Wait a bit and try again.'); return; }
      if(msg.includes('email not confirmed'))         { setNote('info','Email not confirmed','Check your inbox and confirm, then sign in.'); return; }
      setNote('error','Authentication failed', err?.message||'Check your Supabase keys.');
    }
  };

  document.getElementById('forgotPassword').onclick = async (e) => {
    e.preventDefault();
    if(!requireSupabase()) return;
    const email = document.getElementById('email').value.trim();
    if(!email){ setNote('error','Missing email','Enter your email first.'); return; }
    try{
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: "https://www.mentifyhub.com/reset-password.html"
      });
      if(error) throw error;
      setNote('success','Reset email sent','Check your inbox to reset your password.');
    }catch(err){ setNote('error','Error', err.message); }
  };
</script>
</body>
</html>
