<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>MentifyHub — Mentor Directory</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#fff;
--card:#fff;
--text:#0f172a;
--muted:#475569;
--line:#e5e7eb;
--soft:#f8fafc;
--accent:#0b3b89;
--accent2:#1d4ed8;
--radius:18px;
--shadow:0 20px 50px rgba(2,6,23,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
color:var(--text);

background:
radial-gradient(900px 520px at 15% 5%, rgba(29,78,216,.10), transparent 55%),
radial-gradient(900px 520px at 90% 10%, rgba(11,59,137,.08), transparent 55%),
#fff;
}

.container{
max-width:1100px;
margin:0 auto;
padding:22px;
}

/* SAME HEADER STYLE AS DASHBOARD */
.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:16px;

padding:14px 16px;

border:1px solid var(--line);
border-radius:22px;

background:rgba(255,255,255,.82);
backdrop-filter:blur(10px);

box-shadow:0 10px 24px rgba(2,6,23,.06);

position:sticky;
top:14px;
z-index:20;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand h1{
margin:0;
font-size:16px;
}

.brand p{
margin:2px 0 0;
font-size:12px;
color:var(--muted);
}

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:flex-end;
}

.chip{
padding:9px 12px;
border-radius:999px;
border:1px solid var(--line);
background:var(--soft);
font-size:13px;
color:var(--muted);
}

.btn{
padding:10px 14px;
border-radius:14px;
border:1px solid var(--line);
background:#fff;
cursor:pointer;
font-weight:700;
font-size:14px;
}

.btn.solid{
border:none;
background:linear-gradient(180deg,var(--accent2),var(--accent));
color:#fff;
}

.btn.danger{
border-color:rgba(239,68,68,.25);
background:rgba(239,68,68,.05);
color:#b91c1c;
}

/* DIRECTORY CONTENT */

.grid{
margin-top:16px;
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.main{
padding:18px;
}

.title{
margin:0;
font-size:18px;
}

.subtitle{
margin:8px 0 0;
color:var(--muted);
font-size:14px;
}

.filters{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:10px 12px;
border-radius:12px;
border:1px solid var(--line);
}

.list{
margin-top:14px;
display:flex;
flex-direction:column;
gap:10px;
}

.item{
padding:14px;
border:1px solid var(--line);
border-radius:16px;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:6px 10px;
border-radius:999px;
border:1px solid var(--line);
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<header class="topbar">

<a href="index.html" class="brand">

<img src="logo.png" style="width:42px;height:42px;object-fit:contain">

<div>

<h1>MentifyHub</h1>
<p>Green Skills Mentorship</p>

</div>

</a>

<nav class="nav">

<span class="chip" id="whoChip">Mentor Directory</span>

<a class="btn" href="mentor-dashboard.html">Requests</a>

<a class="btn" href="messages.html">Messages</a>

<a class="btn" href="sessions.html">Sessions</a>

<a class="btn" href="mentor-onboarding.html">Edit profile</a>

<button class="btn danger">Sign out</button>

</nav>

</header>


<div class="grid">

<div class="card main">

<h2 class="title">Find your mentor</h2>

<p class="subtitle">

Browse mentors and request mentorship.

</p>


<div class="filters">

<input id="search" placeholder="Search mentor name">

<select id="field">
<option value="">All fields</option>
</select>

<button class="btn" id="clear">Clear</button>

</div>


<div class="list" id="list">

<div class="item">

Loading mentors...

</div>

</div>


</div>

</div>

</div>



<script>

const SUPABASE_URL="https://mscgaaaobxiuzqsukvjc.supabase.co";

const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y";

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const list=document.getElementById("list");

const search=document.getElementById("search");

const field=document.getElementById("field");

async function requireUser(){

const { data:{ user } } = await sb.auth.getUser();

if(!user){

window.location.href="auth.html";

return null;

}

return user;

}

async function loadMentors(){

const user = await requireUser();

if(!user) return;

const { data, error } = await sb
.from("mentors")
.select("*")
.order("updated_at",{ascending:false});

if(error){

list.innerHTML="Error loading mentors";

return;

}

renderMentors(data);

fillFields(data);

}

function renderMentors(data){

list.innerHTML="";

data
.filter(m=>{

if(search.value &&
!m.full_name?.toLowerCase().includes(search.value.toLowerCase()))
return false;

if(field.value && m.field!==field.value)
return false;

return true;

})
.forEach(m=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML=`

<div>

<b>${m.full_name || "Mentor"}</b>
<br>
<small>${m.field || ""}</small>

</div>

<button class="btn solid">
Request
</button>

`;

list.appendChild(div);

});

}

function fillFields(data){

const fields=[...new Set(data.map(m=>m.field).filter(Boolean))];

field.innerHTML='<option value="">All fields</option>';

fields.forEach(f=>{

const opt=document.createElement("option");

opt.value=f;

opt.textContent=f;

field.appendChild(opt);

});

}

search.oninput=loadMentors;

field.onchange=loadMentors;

document.getElementById("clear").onclick=()=>{

search.value="";
field.value="";

loadMentors();

};

loadMentors();

</script>

</body>
</html>
