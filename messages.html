<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MentifyHub — Messages</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="mh-theme.css"/>
  <style>
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      margin-top: 18px;
      height: calc(100vh - 130px);
      min-height: 500px;
    }

    /* Thread list */
    .threads-panel { display: flex; flex-direction: column; overflow: hidden; }
    .threads-panel h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 14px 16px 10px; border-bottom: 1px solid var(--line); }
    .thread-list { overflow-y: auto; flex: 1; }

    .thread-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--line);
      transition: background .1s ease;
    }
    .thread-item:hover   { background: var(--soft); }
    .thread-item.active  { background: rgba(29,78,216,.06); border-left: 3px solid var(--accent2); }

    .thread-item-info b    { display: block; font-size: 13px; font-weight: 700; }
    .thread-item-info span { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Chat panel */
    .chat-panel { display: flex; flex-direction: column; overflow: hidden; }

    .chat-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }

    .chat-ui { flex: 1; display: none; flex-direction: column; overflow: hidden; }

    .chat-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .chat-head h2 { font-size: 15px; font-weight: 700; }
    .chat-head p  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble.me {
      align-self: flex-end;
      background: linear-gradient(160deg, var(--accent2), var(--accent));
      color: #fff;
      border-radius: 14px 14px 4px 14px;
    }
    .bubble.them {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px 14px 14px 4px;
    }
    .bubble small { display: block; margin-top: 5px; opacity: .68; font-size: 11px; }

    .composer {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      align-items: flex-end;
      flex-shrink: 0;
    }
    .composer textarea {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .composer textarea:focus { border-color: var(--accent3); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .chat-panel { min-height: 60vh; }
    }
  </style>
</head>
<body>
<div class="mh-wrap">

  <!-- Topbar -->
  <header class="mh-topbar">
    <a href="index.html" class="mh-brand">
      <img src="logo.png" alt="MentifyHub" class="mh-brand-logo"/>
      <div class="mh-brand-text">
        <strong>MentifyHub</strong>
        <span>Messages</span>
      </div>
    </a>
    <nav class="mh-nav">
      <span class="mh-chip" id="envChip">Connecting…</span>
      <a class="mh-btn" href="mentee-dashboard.html">Dashboard</a>
      <a class="mh-btn" href="mentor-directory.html">Directory</a>
    </nav>
  </header>

  <div class="layout">
    <!-- Thread list -->
    <aside class="mh-card threads-panel">
      <h3>Conversations</h3>
      <div class="thread-list" id="threadList"></div>
    </aside>

    <!-- Chat -->
    <main class="mh-card chat-panel">
      <div class="chat-placeholder" id="chatPlaceholder">
        Select a conversation to start messaging.
      </div>

      <div class="chat-ui" id="chatUI">
        <div class="chat-head">
          <h2 id="threadTitle">Conversation</h2>
          <p id="threadMeta">Messages update live</p>
        </div>
        <div class="messages" id="messageList"></div>
        <div class="composer">
          <textarea id="messageBody" placeholder="Type your message… (Enter to send)"></textarea>
          <button class="mh-btn mh-btn-primary" id="sendBtn" type="button">Send</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  const SUPABASE_URL      = "https://mscgaaaobxiuzqsukvjc.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y";

  const $ = id => document.getElementById(id);
  const sb = (SUPABASE_URL.startsWith("http")&&SUPABASE_ANON_KEY.startsWith("ey"))
    ? window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY) : null;

  let USER=null,THREADS=[],CURRENT=null,ACTIVE_CHANNEL=null;

  function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function formatTime(iso){ try{ return new Date(iso).toLocaleString(); }catch{ return ""; } }

  function threadLabel(thread){
    if(!thread) return "Conversation";
    if(USER.id===thread.mentee_id) return thread.mentor_name||thread.mentor_id||"Mentor";
    return thread.mentee_name||thread.mentee_id||"Mentee";
  }

  async function guardAuth(){
    const {data:{session},error}=await sb.auth.getSession();
    if(error||!session){ window.location.href="auth.html?returnTo=messages.html"; return false; }
    USER=session.user;
    $("envChip").textContent="Live";
    return true;
  }

  async function enrichThreads(rows){
    const out=[];
    for(const row of rows){
      let mentorName=row.mentor_id,menteeName=row.mentee_id;
      const {data:mentor}=await sb.from("mentors").select("full_name").eq("user_id",row.mentor_id).maybeSingle();
      const {data:mentee}=await sb.from("mentees").select("full_name").eq("user_id",row.mentee_id).maybeSingle();
      if(mentor?.full_name) mentorName=mentor.full_name;
      if(mentee?.full_name) menteeName=mentee.full_name;
      out.push({...row,mentor_name:mentorName,mentee_name:menteeName});
    }
    return out;
  }

  async function loadThreads(){
    const {data,error}=await sb.from("mentorship_requests").select("*").or(`mentor_id.eq.${USER.id},mentee_id.eq.${USER.id}`).order("created_at",{ascending:false});
    if(error){ console.error(error); $("threadList").innerHTML=`<div class="mh-empty">Could not load conversations.</div>`; return; }
    THREADS=await enrichThreads(data||[]);
    renderThreadList();

    // Auto-open from URL param
    const reqId=new URLSearchParams(location.search).get("request");
    if(reqId){ const t=THREADS.find(t=>t.id===reqId); if(t) openThread(t.id); }
  }

  function renderThreadList(){
    if(!THREADS.length){ $("threadList").innerHTML=`<div class="mh-empty" style="margin:14px">No conversations yet.</div>`; return; }
    $("threadList").innerHTML=THREADS.map(t=>`
      <div class="thread-item ${CURRENT&&CURRENT.id===t.id?"active":""}" onclick="openThread('${t.id}')">
        <div class="mh-avatar" style="width:34px;height:34px;border-radius:10px;font-size:13px">${esc(threadLabel(t).charAt(0))}</div>
        <div class="thread-item-info" style="min-width:0;flex:1">
          <b>${esc(threadLabel(t))}</b>
          <span>${USER.id===t.mentee_id?"Mentor conversation":"Mentee conversation"}</span>
        </div>
        <span class="mh-badge mh-badge-${(t.status||"pending").toLowerCase()}">${esc(t.status||"pending")}</span>
      </div>`).join("");
  }

  async function openThread(id){
    CURRENT=THREADS.find(t=>t.id===id)||null;
    renderThreadList();
    if(!CURRENT) return;
    $("chatPlaceholder").style.display="none";
    const ui=$("chatUI"); ui.style.display="flex"; ui.style.flexDirection="column";
    $("threadTitle").textContent=threadLabel(CURRENT);
    $("threadMeta").textContent=`Request status: ${CURRENT.status||"pending"}`;
    await loadMessages();
    await markMessagesRead();
    subscribeToThread();
  }
  window.openThread=openThread;

  async function loadMessages(){
    if(!CURRENT) return;
    const {data,error}=await sb.from("messages").select("*").eq("request_id",CURRENT.id).order("created_at",{ascending:true});
    if(error){ console.error(error); $("messageList").innerHTML=`<div class="mh-empty">Could not load messages.</div>`; return; }
    renderMessages(data||[]);
  }

  function renderMessages(messages){
    const box=$("messageList");
    if(!messages.length){ box.innerHTML=`<div class="mh-empty">No messages yet. Say hello!</div>`; return; }
    box.innerHTML=messages.map(m=>{
      const mine=m.sender_id===USER.id;
      return `<div class="bubble ${mine?"me":"them"}">${esc(m.body)}<small>${esc(formatTime(m.created_at))}</small></div>`;
    }).join("");
    box.scrollTop=box.scrollHeight;
  }

  async function markMessagesRead(){
    if(!CURRENT) return;
    await sb.from("messages").update({is_read:true}).eq("request_id",CURRENT.id).neq("sender_id",USER.id).eq("is_read",false);
  }

  function subscribeToThread(){
    if(!CURRENT) return;
    if(ACTIVE_CHANNEL){ sb.removeChannel(ACTIVE_CHANNEL); ACTIVE_CHANNEL=null; }
    ACTIVE_CHANNEL=sb.channel(`messages-thread-${CURRENT.id}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:`request_id=eq.${CURRENT.id}`},
        async()=>{ await loadMessages(); await markMessagesRead(); })
      .subscribe();
  }

  async function sendMessage(){
    if(!CURRENT) return;
    if((CURRENT.status||"").toLowerCase()!=="accepted"){ alert("Messaging is only available for accepted requests."); return; }
    const body=$("messageBody").value.trim();
    if(!body) return;
    const btn=$("sendBtn");
    btn.disabled=true; btn.textContent="Sending…";
    try{
      const {error}=await sb.from("messages").insert({request_id:CURRENT.id,sender_id:USER.id,mentor_id:CURRENT.mentor_id,mentee_id:CURRENT.mentee_id,body,is_read:false});
      if(error) throw error;
      $("messageBody").value="";
      await loadMessages();

      // Notify the recipient
      const recipientId = USER.id === CURRENT.mentor_id ? CURRENT.mentee_id : CURRENT.mentor_id;
      const senderName  = USER.user_metadata?.full_name || USER.email || "Your contact";
      const preview     = body.length > 100 ? body.slice(0, 100) + "…" : body;

      // 1. In-app bell notification
      try{
        await sb.from("notifications").insert({
          user_id:    recipientId,
          title:      `New message from ${senderName}`,
          message:    preview,
          type:       "message",
          is_read:    false,
          request_id: CURRENT.id
        });
      }catch(notifErr){ console.error("Notification error:", notifErr); }

      // 2. Email notification
      try{
        // Get recipient email
        const isRecipientMentor = recipientId === CURRENT.mentor_id;
        const table = isRecipientMentor ? "mentors" : "mentees";
        const { data: recipientRow } = await sb.from(table).select("email").eq("user_id", recipientId).maybeSingle();

        if(recipientRow?.email){
          await fetch("https://mscgaaaobxiuzqsukvjc.supabase.co/functions/v1/notify-message", {
            method: "POST",
            headers: {
              "Content-Type":  "application/json",
              "apikey":        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y",
              "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y"
            },
            body: JSON.stringify({
              recipient_email: recipientRow.email,
              sender_name:     senderName,
              message_preview: preview,
              request_id:      CURRENT.id
            })
          });
        }
      }catch(emailErr){ console.error("Email error:", emailErr); }

    }catch(e){ console.error(e); alert(e.message||"Could not send message"); }
    finally{ btn.disabled=false; btn.textContent="Send"; }
  }

  $("sendBtn").addEventListener("click",sendMessage);
  $("messageBody").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });

  window.addEventListener("load",async()=>{
    const ok=await guardAuth();
    if(!ok) return;
    await loadThreads();
  });
</script>
</body>
</html>
