<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — MentifyHub</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .note {
      margin-top: 15px;
      font-size: 14px;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>

<body>

  <div class="card">
    <h2>Reset Your Password</h2>

    <input type="password" id="password" placeholder="New password" />
    <input type="password" id="confirmPassword" placeholder="Confirm password" />

    <button id="updateBtn">Update Password</button>

    <div id="note" class="note"></div>
  </div>

<script>
const sb = supabase.createClient(
  "https://mscgaaaobxiuzqsukvjc.supabase.co",
  "YOUR_ANON_KEY"
);

const note = document.getElementById("note");

function setNote(type, msg){
  note.className = "note " + type;
  note.innerText = msg;
}

document.getElementById("updateBtn").onclick = async () => {
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  if(!password || !confirm){
    return setNote("error", "Fill all fields");
  }

  if(password.length < 6){
    return setNote("error", "Password must be at least 6 characters");
  }

  if(password !== confirm){
    return setNote("error", "Passwords do not match");
  }

  try {
    const { error } = await sb.auth.updateUser({
      password: password
    });

    if(error) throw error;

    setNote("success", "Password updated successfully!");

    setTimeout(() => {
      window.location.href = "/auth.html?mode=signin";
    }, 2000);

  } catch (err) {
    setNote("error", err.message);
  }
};
</script>

</body>
</html>
