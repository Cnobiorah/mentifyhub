<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — MentifyHub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="mh-theme.css"/>
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .card { width: 100%; max-width: 380px; padding: 28px; }
    .icon { width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg,rgba(29,78,216,.12),rgba(11,59,137,.08)); border: 1px solid rgba(29,78,216,.18); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
    .note { margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--line); font-size: 13px; line-height: 1.5; }
    .note.success { border-color: var(--accepted-line); background: var(--accepted-bg); color: var(--accepted-fg); }
    .note.error   { border-color: var(--declined-line); background: var(--declined-bg); color: var(--declined-fg); }
  </style>
</head>
<body>
<div class="mh-wrap-sm">
  <a href="index.html" style="display:flex;align-items:center;gap:8px;margin-bottom:20px;text-decoration:none">
    <img src="logo.png" style="width:32px;height:32px;border-radius:8px;object-fit:contain"/>
    <strong style="font-size:14px;color:var(--text)">MentifyHub</strong>
  </a>

  <div class="mh-card card">
    <div class="icon">🔐</div>
    <h2 style="font-size:20px;font-weight:800;letter-spacing:-.2px">Reset your password</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5">Enter your new password below.</p>

    <div class="mh-field" style="margin-top:18px">
      <label class="mh-label" for="password">New password</label>
      <input class="mh-input" type="password" id="password" placeholder="At least 6 characters"/>
    </div>
    <div class="mh-field">
      <label class="mh-label" for="confirmPassword">Confirm password</label>
      <input class="mh-input" type="password" id="confirmPassword" placeholder="Repeat password"/>
    </div>

    <button class="mh-btn mh-btn-primary mh-btn-full mh-btn-lg" id="updateBtn" style="margin-top:4px">Update password</button>

    <div id="note"></div>
  </div>
</div>

<script>
  const sb = supabase.createClient(
    "https://mscgaaaobxiuzqsukvjc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y"
  );

  const note = document.getElementById("note");
  function setNote(type,msg){ note.className="note "+type; note.textContent=msg; }

  document.getElementById("updateBtn").onclick = async () => {
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirmPassword").value;
    if(!password||!confirm) return setNote("error","Please fill in both fields.");
    if(password.length<6) return setNote("error","Password must be at least 6 characters.");
    if(password!==confirm) return setNote("error","Passwords do not match.");
    try{
      const {error}=await sb.auth.updateUser({password});
      if(error) throw error;
      setNote("success","Password updated successfully! Redirecting…");
      setTimeout(()=>window.location.href="/auth.html?mode=signin",2000);
    }catch(err){ setNote("error",err.message); }
  };
</script>
</body>
</html>
