<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MentifyHub — Sessions</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#fff;
--card:#fff;
--text:#0f172a;
--muted:#475569;
--line:#e5e7eb;
--soft:#f8fafc;
--accent:#0b3b89;
--accent2:#1d4ed8;
--radius:18px;
--shadow:0 20px 50px rgba(2,6,23,.08)
}

*{box-sizing:border-box}

body{
margin:0;
font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
color:var(--text);
background:
radial-gradient(900px 520px at 15% 5%, rgba(29,78,216,.10), transparent 55%),
radial-gradient(900px 520px at 90% 10%, rgba(11,59,137,.08), transparent 55%),
#fff
}

.container{max-width:1100px;margin:0 auto;padding:22px}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:16px;
padding:14px 16px;
border:1px solid var(--line);
border-radius:22px;
background:rgba(255,255,255,.82);
backdrop-filter:blur(10px);
box-shadow:0 10px 24px rgba(2,6,23,.06);
position:sticky;
top:14px;
z-index:20;
}    

.logo{
width:40px;
height:40px;
border-radius:14px;
background:linear-gradient(135deg,#dbeafe,#bfdbfe);
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;
padding:10px 14px;
border-radius:14px;
border:1px solid var(--line);
background:#fff;
cursor:pointer;
font-weight:700;
font-size:14px;
color:var(--text);
text-decoration:none;
transition:transform .06s ease, box-shadow .2s ease, border-color .2s ease;
user-select:none;
}

.btn:hover{
transform:translateY(-1px);
box-shadow:0 10px 24px rgba(2,6,23,.08);
border-color:#dbe2ea;
}

.btn.solid{
border-color:transparent;
background:linear-gradient(180deg, var(--accent2), var(--accent));
color:#fff;
box-shadow:0 16px 40px rgba(29,78,216,.22);
}


.btn.danger{
border-color:rgba(239,68,68,.25);
background:linear-gradient(180deg, rgba(239,68,68,.08), rgba(239,68,68,.05));
color:#b91c1c;
}
.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand h1{
margin:0;
font-size:16px;
}

.brand p{
margin:2px 0 0;
font-size:12px;
color:var(--muted);
}

.nav{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
justify-content:flex-end;
}

.chip{
padding:9px 12px;
border-radius:999px;
border:1px solid var(--line);
background:var(--soft);
font-size:13px;
color:var(--muted);
}

.layout{
display:grid;
grid-template-columns:320px 1fr;
gap:16px;
margin-top:16px;
}

.card{
background:#fff;
border:1px solid var(--line);
border-radius:18px;
padding:16px;
}

.threadItem{
padding:12px;
border:1px solid var(--line);
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.threadItem.active{
background:#f1f5f9;
}

.formGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
}

.formGrid input,
.formGrid textarea,
.formGrid select{
padding:12px;
border-radius:12px;
border:1px solid var(--line);
width:100%;
}

.formGrid textarea{
grid-column:1/-1;
min-height:80px;
}

.session{
margin-top:12px;
padding:12px;
border:1px solid var(--line);
border-radius:12px;
}

.empty{
margin-top:12px;
padding:16px;
border:1px dashed var(--line);
border-radius:12px;
color:var(--muted);
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<header class="topbar">

<a href="index.html" class="brand">
  <img src="logo.png" alt="MentifyHub logo" class="logo">
  <div>
    <h1>MentifyHub</h1>
    <p>Green Skills Mentorship</p>
  </div>
</a>

<nav class="nav">

<span class="chip" id="whoChip">Checking session…</span>

<a class="btn" id="dashboardLink">Dashboard</a>

<a class="btn" href="mentor-directory.html">Directory</a>

<a class="btn" href="messages.html">Messages</a>

<a class="btn solid" href="sessions.html">Sessions</a>

<a class="btn" href="mentor-onboarding.html">Edit profile</a>

<button class="btn danger" id="signOutBtn">Sign out</button>

</nav>

</header>

<div class="layout">

<aside class="card">
<b>Accepted requests</b>
<div id="requestList"></div>
</aside>

<main class="card">

<div id="sessionHeader">
<h3>Select request</h3>
</div>

<div id="sessionEmpty" class="empty">
Choose accepted request
</div>

<div id="sessionPane" style="display:none">

<div class="formGrid">

<input id="scheduledFor" type="datetime-local"/>

<select id="duration">
<option value="30">30 min</option>
<option value="45" selected>45 min</option>
<option value="60">60 min</option>
</select>

<input id="meetingLink" placeholder="Meeting link"/>

<input id="status" value="proposed" readonly/>

<textarea id="sessionNotes" placeholder="Agenda"></textarea>

</div>

<button class="btn solid" id="saveBtn">Save session</button>

<hr style="margin:20px 0">

<h3>Update progress</h3>

<div class="formGrid">

<input id="progressPercent" type="number" min="0" max="100" placeholder="Progress %"/>

<textarea id="progressNotes" placeholder="Progress notes"></textarea>

</div>

<button class="btn solid" id="saveProgressBtn">Save progress</button>

<div id="sessions"></div>

</div>

</main>

</div>

</div>

<script>
const SUPABASE_URL="https://mscgaaaobxiuzqsukvjc.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2dhYWFvYnhpdXpxc3VrdmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MDU5NjIsImV4cCI6MjA4NDA4MTk2Mn0.5MWa3RUQmkpchRqn7q1CJz37amlnqIBE-s6HMQ455-Y";

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);

let USER=null;
let REQUESTS=[];
let CURRENT=null;

async function requireAuth(){
const {data:{session}}=await sb.auth.getSession();
if(!session){location.href="auth.html";return;}
USER=session.user;
const dash =
document.getElementById("dashboardLink");

const { data: mentorProfile } = await sb
.from("mentors")
.select("user_id")
.eq("user_id", USER.id)
.maybeSingle();

dash.href =
mentorProfile
? "mentor-dashboard.html"
: "mentee-dashboard.html";

/* update header label */

$("whoChip").textContent =
mentorProfile
? USER.email + " • Mentor"
: USER.email + " • Mentee";
return USER;
}

async function loadRequests(){
const {data}=await sb
.from("mentorship_requests")
.select("*")
.eq("status","accepted")
.or(`mentee_id.eq.${USER.id},mentor_id.eq.${USER.id}`);

REQUESTS=data||[];
renderRequests();
}

function renderRequests(){
$("requestList").innerHTML=REQUESTS
.map(r=> `
<div class="threadItem"
onclick="openRequest('${r.id}')">

Request ${r.id.substring(0,6)}

</div>
`)
.join("");
}

function openRequest(id){
CURRENT=REQUESTS.find(r=>r.id===id);
$("sessionEmpty").style.display="none";
$("sessionPane").style.display="block";
loadSessions();
}

async function loadSessions(){

const {data,error}=await sb
.from("sessions")
.select("*")
.eq("request_id",CURRENT.id);

if(error){
console.error(error);
return;
}

if(!data || data.length===0){

$("sessions").innerHTML=
`<div class="empty">No sessions yet</div>`;

return;
}

$("sessions").innerHTML=data.map(s=>`
<div class="session">

<b>${new Date(s.scheduled_for).toLocaleString()}</b>

<div class="muted">
${s.duration_minutes} minutes
</div>

</div>
`).join("");

}

async function saveSession(){

if(!CURRENT){
alert("Select a request first");
return;
}

const scheduledFor = $("scheduledFor").value;
if(!scheduledFor){

alert("Select date and time");

return;

}
const durationMinutes = Number($("duration").value);
const meetingLink = $("meetingLink").value;
const notes = $("sessionNotes").value;
const status = $("status").value;

const { error } = await sb
.from("sessions")
.insert({

request_id: CURRENT.id,

mentor_id: CURRENT.mentor_id,

mentee_id: CURRENT.mentee_id,

proposed_by: USER.id,

scheduled_for: scheduledFor,

duration_minutes: durationMinutes,

meeting_link: meetingLink,

notes: notes,

status: status

});

if(error){

console.error(error);

alert("Error saving session");

return;

}

alert("Session saved");

loadSessions();

}

async function saveProgress(){
await sb.from("mentorship_progress").insert({
request_id:CURRENT.id,
mentor_id:CURRENT.mentor_id,
mentee_id:CURRENT.mentee_id,
progress_percent:Number($("progressPercent").value),
notes:$("progressNotes").value
});
alert("progress saved");
$("progressPercent").value="";
$("progressNotes").value="";
}

$("saveBtn").onclick=saveSession;
$("saveProgressBtn").onclick=saveProgress;

requireAuth().then(loadRequests);
</script>

</body>
</html>
