<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MentifyHub Testing</title>


<style>

body{

font-family: system-ui, -apple-system, Segoe UI, Roboto;

background:#f8fafc;

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}



.container{

background:white;

padding:40px;

border-radius:16px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

text-align:center;

max-width:460px;

width:90%;

}



.logo{

width:75px;

display:block;

margin:0 auto 15px auto;

}



h1{

margin-bottom:5px;

color:#065f46;

font-size:28px;

}



.subtitle{

color:#64748b;

margin-bottom:25px;

}



.note{

font-size:14px;

color:#475569;

margin-bottom:20px;

}



button{

width:100%;

padding:14px;

margin:10px 0;

border:none;

border-radius:12px;

font-size:15px;

cursor:pointer;

font-weight:600;

transition:0.2s;

}



.mentify{

background:#16a34a;

color:white;

}



.feedback{

background:#0f172a;

color:white;

}



button:hover{

opacity:0.92;

transform:translateY(-1px);

}



footer{

margin-top:12px;

font-size:13px;

color:#94a3b8;

}



</style>



</head>



<body>



<div class="container">



<img

src="https://mentifyhub.com/logo.png"

class="logo"

>



<h1>MentifyHub Testing</h1>



<p class="subtitle">

Help improve MentifyHub by testing and sharing feedback.

</p>



<p class="note">

Test as mentor or mentee.

</p>



<button

class="mentify"

onclick="openSoftware('https://mentifyhub.com/')">

Test MentifyHub

</button>



<button
class="feedback"
onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScxpNPYHSTnedJUffgHUQdbMHq78exVvdzHT4EbtlEJOQymCg/viewform','_blank')">
Give Feedback
</button>


<footer>

Your feedback helps improve MentifyHub 🚀

</footer>



</div>



<script>



function openSoftware(link){

window.open(link,'_blank');



setTimeout(function(){

window.open(
'https://docs.google.com/forms/d/e/1FAIpQLScxpNPYHSTnedJUffgHUQdbMHq78exVvdzHT4EbtlEJOQymCg/viewform',
'_blank'
);

},20000);



}



</script>



</body>



</html>
