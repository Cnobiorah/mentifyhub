<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MentifyHub — Testing</title>
  <link rel="stylesheet" href="mh-theme.css"/>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 36px 32px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 16px;
      margin: 0 auto 18px;
      display: block;
      border: 1px solid rgba(29,78,216,.12);
      box-shadow: 0 2px 10px rgba(29,78,216,.10);
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .note {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      background: var(--soft2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 12px;
      margin-bottom: 24px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--subtle);
    }
  </style>
</head>
<body>

<div class="mh-wrap-sm">
  <div class="mh-card card">
    <img src="logo.png" class="logo" alt="MentifyHub logo"/>

    <h1>MentifyHub Testing</h1>
    <p class="subtitle">Help improve MentifyHub by testing and sharing your feedback.</p>

    <div class="note">🧪 Test as a mentor or mentee</div>

    <div class="btn-group">
      <button
        class="mh-btn mh-btn-primary mh-btn-full mh-btn-lg"
        onclick="openSoftware('https://mentifyhub.com/')">
        Test MentifyHub
      </button>

      <button
        class="mh-btn mh-btn-full mh-btn-lg"
        style="background:#0f172a;color:#fff;border-color:transparent"
        onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScxpNPYHSTnedJUffgHUQdbMHq78exVvdzHT4EbtlEJOQymCg/viewform','_blank')">
        Give feedback
      </button>
    </div>

    <footer>Your feedback helps improve MentifyHub 🚀</footer>
  </div>
</div>

<script>
  function openSoftware(link){
    window.open(link, '_blank');
    setTimeout(function(){
      window.open(
        'https://docs.google.com/forms/d/e/1FAIpQLScxpNPYHSTnedJUffgHUQdbMHq78exVvdzHT4EbtlEJOQymCg/viewform',
        '_blank'
      );
    }, 20000);
  }
</script>

</body>
</html>
